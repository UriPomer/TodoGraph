name: Publish @todograph/mcp to npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp/**'
  workflow_dispatch:

jobs:
  publish:
    name: Publish MCP package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP package
        run: pnpm --filter @todograph/mcp... build

      - name: Test MCP package
        run: pnpm --filter @todograph/mcp test

      - name: Check if version changed
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./packages/mcp/package.json').version")
          NPM_VERSION=$(npm view @todograph/mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PKG_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.changed == 'true'
        run: |
          cd packages/mcp
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
