name: Publish @todograph/mcp to npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/npm-publish-mcp.yml'
  workflow_dispatch:

concurrency:
  group: todograph-mcp-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish MCP package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP test dependencies
        run: pnpm --filter @todograph/server... build

      - name: Test MCP package
        run: pnpm --filter @todograph/mcp test

      - name: Verify or publish exact MCP package
        run: pnpm --filter @todograph/mcp publish:npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
