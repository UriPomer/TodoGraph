name: Release Windows EXE

# 两种触发方式：
# 1. 推送 v* 标签自动构建+发布
# 2. 在 Actions 页面手动触发，输入版本号即可发布
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如 0.2.0，不要加 v 前缀）'
        required: true
        type: string

permissions:
  # 让内置 GITHUB_TOKEN 有权创建 Release 和上传资产
  contents: write

jobs:
  build-windows:
    name: Build Windows portable exe
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # 2. 启 pnpm（从 package.json 的 packageManager 字段读版本）
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      # 3. 装 Node（用 pnpm 的 lockfile 做 cache key）
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      # 4. 安装依赖
      # 跟本地 .npmrc 保持一致（node-linker=hoisted），避免 electron-builder 跟不进 pnpm 的 symlink 布局
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 编译 core / shared / server / renderer（electron-vite 会在 packaging 步骤再跑一次主进程构建）
      - name: Build workspace packages
        run: pnpm -r build

      - name: Test workspace packages
        run: pnpm -r test

      # 6. 打 portable exe
      # electron-builder 的产物会落到仓库根目录 Build/（由 packages/app/package.json 里 directories.output 指向 ../../Build）
      - name: Package Windows portable exe
        run: pnpm --filter @todograph/app exec electron-builder --win portable --publish never
        env:
          # electron-builder 内部会用它查 GitHub Release API；内置 GITHUB_TOKEN 即可
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. 把产物作为 workflow artifact 上传（不论是否是 tag 触发，都能在 Actions 里下载）
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: TodoGraph-windows-portable
          path: Build/*.exe
          if-no-files-found: error
          retention-days: 30

      # 8. 发布 Release（tag 推送或手动触发均可）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            Build/TodoGraph.exe
          # 手动触发时用输入的版本号，tag 推送时用 tag 名
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
