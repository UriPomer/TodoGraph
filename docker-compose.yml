services:
  todograph:
    image: ghcr.io/uripomer/todograph:main
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist data directory so container removal does not lose data
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/packages/app/dist
    restart: unless-stopped
