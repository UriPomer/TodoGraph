services:
  todograph:
    image: ghcr.io/uripomer/todograph:main
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist data directory so container removal does not lose data
      - ./data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/packages/app/dist
      - REGISTRATION_KEY=
      - SESSION_SECRET=
    restart: unless-stopped
