services:
  todograph:
    image: ghcr.io/uripomer/todograph:main
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist data directory so container removal does not lose data
      - ./data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/packages/app/dist
      - SESSION_SECRET=${SESSION_SECRET:?copy .env.example to .env and replace SESSION_SECRET}
      - REGISTRATION_KEY=${REGISTRATION_KEY:-}
      # Loopback HTTP needs non-secure cookies. Set true only behind HTTPS.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    restart: unless-stopped
